name: Release

on:
  workflow_dispatch:
    inputs:
      bumpType:
        description: 'SemVer component to bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Bump version and publish release
    runs-on: ubuntu-latest

    steps:
      # Default GITHUB_TOKEN can't push to master: the branch ruleset
      # requires PRs + status checks and only bypasses the DeployKey and
      # OrganizationAdmin actors. Check out over SSH with the write-enabled
      # deploy key so the release/tag pushes run as the DeployKey actor and
      # hit the ruleset bypass (same key as docs.yml).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DOCS_DEPLOY_KEY }}

      - name: Set up Corretto 11
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 11
          cache: maven

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: bump
        run: |
          current=$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          base=${current%-SNAPSHOT}
          IFS='.' read -r major minor patch <<<"${base}"
          # Treat a missing patch component (e.g. "1.0") as 0.
          patch=${patch:-0}
          case "${{ inputs.bumpType }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          next="${major}.${minor}.$((patch + 1))-SNAPSHOT"
          echo "current=${current}"
          echo "new=${new}"
          echo "next=${next}"
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "new=${new}" >> "$GITHUB_OUTPUT"
          echo "next=${next}" >> "$GITHUB_OUTPUT"

      - name: Refuse release if tag already exists
        run: |
          if git rev-parse "refs/tags/v${{ steps.bump.outputs.new }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.bump.outputs.new }} already exists. Choose a different bump." >&2
            exit 1
          fi

      - name: Set release version
        run: mvn -B -ntp versions:set -DnewVersion=${{ steps.bump.outputs.new }} -DgenerateBackupPoms=false

      - name: Build + verify
        run: mvn -B -ntp verify

      - name: Stage release JAR
        id: artifact
        run: |
          jar=$(ls target/FleetProvisioningByClaim.jar 2>/dev/null \
                || ls target/FleetProvisioningByClaim-*.jar 2>/dev/null \
                || ls target/*.jar | head -n1)
          if [ -z "$jar" ]; then
            echo "No release JAR found under target/" >&2
            exit 1
          fi
          echo "jar=${jar}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release version
        run: |
          git add pom.xml
          git commit -m "release: v${{ steps.bump.outputs.new }}"
          git tag -a "v${{ steps.bump.outputs.new }}" -m "v${{ steps.bump.outputs.new }}"

      - name: Bump to next -SNAPSHOT
        run: |
          mvn -B -ntp versions:set -DnewVersion=${{ steps.bump.outputs.next }} -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore: bump to ${{ steps.bump.outputs.next }}"

      - name: Push commits and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.bump.outputs.new }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new }}"
          name: "v${{ steps.bump.outputs.new }}"
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.jar }}
